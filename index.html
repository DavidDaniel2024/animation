<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            background-color: chartreuse;
            margin: 2px;
            animation-name: daniel;
            animation-duration: 5s;
            animation-fill-mode: forwards;
            animation-direction: reverse;
            position: relative;
            animation-delay: 0s;
            animation-timing-function: ease-out;
            animation-iteration-count: infinite;
        }

        @keyframes daniel {
            0% {
                background-color: green;
                border-radius: 200px;
                left: 0px;
                top: 0px;
            }

            20% {
                background-color: blue;
                border-radius: 200px;
                left: 100px;
                top: 100px;
            }

            30% {
                background-color: yellow;
                border-radius: 200px;
                left: 0px;
                top: 100px;
                width: 100px;
            }
        }
    </style>
</head>

<body>
    <div></div>
    <div></div>
    <div></div>
</body>

</html>
